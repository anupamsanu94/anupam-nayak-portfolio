<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      background: #0f172a;
      color: #e2e8f0;
      line-height: 1.6;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 40px 20px;
    }

    h1, h2, h3 {
      color: #f8fafc;
    }

    a {
      color: #38bdf8;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .nav {
      background: #020617;
      padding: 15px 20px;
      border-bottom: 1px solid #1e293b;
    }

    .nav a {
      margin-right: 20px;
      font-weight: 500;
    }

    .tag {
      display: inline-block;
      background: #1e293b;
      padding: 4px 10px;
      border-radius: 6px;
      margin-right: 8px;
      font-size: 12px;
    }
  </style>
</head>

<body>

<div class="nav">
  <a href="{{ site.baseurl }}/">Home</a>
